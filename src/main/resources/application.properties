# Configuración del servidor
server.port=8080

# Configuración de H2 Database
spring.datasource.url=jdbc:h2:mem:learningplatformdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# Configuración de JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuración de Actuator
management.endpoints.web.exposure.include=health,info,metrics,beans,env
management.endpoint.health.show-details=always

# Información de la aplicación
info.app.name=LearningPlatform
info.app.description=Plataforma de Aprendizaje en Linea
info.app.version=1.0.0
